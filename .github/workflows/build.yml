name: Build ZeroMount

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: r27c
  API_LEVEL: '21'

jobs:
  # ---- SUSFS patch validation (B01, S01, S02) ----
  susfs-patch:
    name: Validate SUSFS patches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned SUSFS version
        id: susfs-ver
        run: echo "ref=$(cat susfs-version.txt | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Clone upstream SUSFS at pinned commit
        run: |
          git clone --depth 1 --branch "${{ steps.susfs-ver.outputs.ref }}" \
            https://gitlab.com/simonpunk/susfs4ksu.git /tmp/susfs4ksu

      - name: Apply Custom SUSFS Patches
        run: |
          for script in patches/inject-susfs-*.sh; do
            echo "Running $(basename "$script")"
            bash "$script" /tmp/susfs4ksu/kernel_patches || exit 1
          done

  # ---- Rust tests ----
  test:
    name: Test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-targets

  # ---- Rust cross-compilation (B02, R09, R10) ----
  rust-build:
    name: Rust ${{ matrix.abi }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
            binary: zm-arm64
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
            binary: zm-arm
          - target: x86_64-linux-android
            abi: x86_64
            binary: zm-x86_64
          - target: i686-linux-android
            abi: x86
            binary: zm-x86
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Build release binary
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo ndk -t ${{ matrix.abi }} build --release

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/zeromount ${{ matrix.binary }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
          retention-days: 7

  # ---- WebUI build (B03) ----
  webui-build:
    name: WebUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: webui
        run: pnpm install --frozen-lockfile

      - name: Build WebUI
        working-directory: webui
        run: pnpm run build

      - name: Upload webroot artifact
        uses: actions/upload-artifact@v4
        with:
          name: webroot
          path: module/webroot/
          retention-days: 7

  # ---- ZIP packaging (B04) ----
  package:
    name: Package ZIP
    runs-on: ubuntu-latest
    needs: [rust-build, webui-build, susfs-patch]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: staging/

      - name: Stage binaries and webroot into module/
        run: |
          cp staging/zm-arm64/zm-arm64 module/
          cp staging/zm-arm/zm-arm module/
          cp staging/zm-x86_64/zm-x86_64 module/
          cp staging/zm-x86/zm-x86 module/
          rm -rf module/webroot
          cp -r staging/webroot module/webroot

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v2.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ZIP
        run: |
          chmod +x scripts/package.sh
          ./scripts/package.sh --version "${{ steps.version.outputs.tag }}" --out "zeromount-${{ steps.version.outputs.tag }}.zip"

      - name: Upload module ZIP
        uses: actions/upload-artifact@v4
        with:
          name: zeromount-module
          path: zeromount-*.zip
          retention-days: 14

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: zeromount-*.zip
